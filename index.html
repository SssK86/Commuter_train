<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>通勤ワンタップ</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --border: rgba(255, 255, 255, 0.08);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 440px;
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 24px 18px 18px;
      backdrop-filter: blur(8px);
    }

    .title {
      margin: 0;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-align: center;
    }

    .subtitle {
      margin: 8px 0 0;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .buttons {
      display: grid;
      gap: 14px;
      margin-top: 24px;
    }

    .route-button {
      width: 100%;
      border: 0;
      border-radius: 20px;
      padding: 22px 18px;
      color: var(--text);
      background: linear-gradient(180deg, #1f2937 0%, #111827 100%);
      box-shadow: var(--shadow);
      cursor: pointer;
      text-align: left;
      transition: transform 0.15s ease, opacity 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .route-button:active {
      transform: scale(0.985);
      opacity: 0.95;
    }

    .route-label {
      display: block;
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .route-path {
      display: block;
      font-size: 0.98rem;
      color: var(--muted);
    }

    .note {
      margin-top: 18px;
      color: var(--muted);
      text-align: center;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <main class="app">
    <h1 class="title">通勤ワンタップ</h1>
    <p class="subtitle">現在時刻で経路検索</p>

    <section class="buttons">
      <button class="route-button" id="goButton" type="button" aria-label="行き 大宮から麹町を検索">
        <span class="route-label">行き</span>
        <span class="route-path">大宮 → 麹町</span>
      </button>

      <button class="route-button" id="returnButton" type="button" aria-label="帰り 麹町から大宮を検索">
        <span class="route-label">帰り</span>
        <span class="route-path">麹町 → 大宮</span>
      </button>
    </section>

    <p class="note">タップすると Yahoo!路線情報で開きます</p>
  </main>

  <script>
    const BASE_URL = "https://transit.yahoo.co.jp/search/result";

    function formatDateForYahoo(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}${month}${day}`;
    }

    function formatHour(date) {
      return String(date.getHours()).padStart(2, "0");
    }

    function formatMinute(date) {
      return String(date.getMinutes()).padStart(2, "0");
    }

    function openRoute(from, to) {
      const now = new Date();
      const params = new URLSearchParams({
        from,
        to,
        y: formatDateForYahoo(now),
        m: formatHour(now),
        d: formatMinute(now),
        type: "1"
      });

      window.location.href = `${BASE_URL}?${params.toString()}`;
    }

    document.getElementById("goButton").addEventListener("click", () => {
      openRoute("大宮", "麹町");
    });

    document.getElementById("returnButton").addEventListener("click", () => {
      openRoute("麹町", "大宮");
    });
  </script>
</body>
</html>
