<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>通勤ワンタップ</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --border: rgba(255, 255, 255, 0.08);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 440px;
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 24px 18px 18px;
    }

    .title {
      margin: 0;
      font-size: 1.8rem;
      font-weight: 700;
      text-align: center;
    }

    .subtitle {
      margin: 8px 0 0;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .buttons {
      display: grid;
      gap: 14px;
      margin-top: 24px;
    }

    .route-button {
      width: 100%;
      border: 0;
      border-radius: 20px;
      padding: 22px 18px;
      color: var(--text);
      background: linear-gradient(180deg, #1f2937 0%, #111827 100%);
      box-shadow: var(--shadow);
      cursor: pointer;
      text-align: left;
    }

    .route-button:active {
      transform: scale(0.98);
    }

    .route-label {
      display: block;
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .route-path {
      display: block;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .note {
      margin-top: 18px;
      color: var(--muted);
      text-align: center;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <main class="app">
    <h1 class="title">通勤ワンタップ</h1>
    <p class="subtitle">NAVITIMEで現在時刻検索</p>

    <section class="buttons">
      <button class="route-button" onclick="openRoute('大宮','麹町')">
        <span class="route-label">行き</span>
        <span class="route-path">大宮 → 麹町</span>
      </button>

      <button class="route-button" onclick="openRoute('麹町','大宮')">
        <span class="route-label">帰り</span>
        <span class="route-path">麹町 → 大宮</span>
      </button>
    </section>

    <p class="note">タップでNAVITIMEを開きます</p>
  </main>

  <script>
    function openRoute(from, to) {
      const url = `https://www.navitime.co.jp/transfer/searchlist?orvStationName=${encodeURIComponent(from)}&dnvStationName=${encodeURIComponent(to)}`;
      window.location.href = url;
    }
  </script>
</body>
</html>
