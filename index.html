<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通勤ワンタップ</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f172a;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    h1 {
      margin-bottom: 24px;
      font-size: 28px;
    }

    button {
      width: 100%;
      padding: 20px;
      margin-bottom: 16px;
      font-size: 24px;
      border: none;
      border-radius: 16px;
      background: #1e293b;
      color: #ffffff;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.98);
    }

    .sub {
      font-size: 14px;
      color: #cbd5e1;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>通勤ワンタップ</h1>

    <button onclick="goToNavitime('大宮','麹町')">
      行き
      <div class="sub">大宮 → 麹町</div>
    </button>

    <button onclick="goToNavitime('麹町','大宮')">
      帰り
      <div class="sub">麹町 → 大宮</div>
    </button>
  </div>

  <script>
    function goToNavitime(fromStation, toStation) {
      var url =
        "https://www.navitime.co.jp/transfer/searchlist" +
        "?orvStationName=" + encodeURIComponent(fromStation) +
        "&dnvStationName=" + encodeURIComponent(toStation);

      window.location.href = url;
    }
  </script>
</body>
</html>
